# pytest configuration for Exitus E2E Tests

[pytest]
# Test paths
testpaths = tests/e2e

# File patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options
addopts = 
    --verbose
    --capture=no
    --tb=short
    --strict-markers
    --maxfail=5
    -p no:warnings

# Markers
markers =
    smoke: Testes de fumaça (críticos, execução rápida)
    regression: Testes de regressão (suite completa)
    slow: Testes lentos (podem ser pulados em CI rápido)
    auth: Testes de autenticação
    dashboard: Testes de dashboard
    buy_signals: Testes de buy signals
    portfolio: Testes de portfolios
    transaction: Testes de transações
    alert: Testes de alertas
    report: Testes de relatórios

# Playwright options (via pytest-playwright)
# --headed: Executar com navegador visível
# --browser chromium: Usar apenas Chromium
# --slowmo 100: Adicionar delay de 100ms entre ações (debug)
