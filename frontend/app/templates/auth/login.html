<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Exitus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:     #a38c65;
            --primary-dk:  #8b7454;
            --primary-lt:  #f8f6f3;
            --text:        #212529;
            --text-muted:  #6c757d;
            --border:      #e9ecef;
            --surface:     #f8f9fa;
            --danger:      #dc3545;
            --success:     #28a745;
            --font:        'Nunito', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* ── Card principal ── */
        .login-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,.06);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
        }

        /* ── Branding ── */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-icon {
            width: 56px; height: 56px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: .75rem;
        }
        .brand-icon i { color: #fff; font-size: 1.5rem; }
        .brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -.5px;
        }
        .brand p {
            font-size: .85rem;
            color: var(--text-muted);
            margin-top: .25rem;
        }

        /* ── Formulário ── */
        .field { margin-bottom: 1.1rem; }
        .field label {
            display: block;
            font-size: .82rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: .35rem;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        .field .input-wrap { position: relative; }
        .field .input-wrap i {
            position: absolute;
            left: .85rem; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: .85rem;
            pointer-events: none;
        }
        .field input {
            width: 100%;
            padding: .65rem .85rem .65rem 2.4rem;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-family: var(--font);
            font-size: .95rem;
            color: var(--text);
            background: #fff;
            transition: border-color .2s;
            outline: none;
        }
        .field input:focus { border-color: var(--primary); }

        /* ── Botão ── */
        .btn-login {
            width: 100%;
            padding: .75rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            transition: background .2s, transform .1s;
            margin-top: 1.4rem;
        }
        .btn-login:hover:not(:disabled) { background: var(--primary-dk); }
        .btn-login:active:not(:disabled) { transform: scale(.98); }
        .btn-login:disabled { opacity: .65; cursor: not-allowed; }

        /* ── Mensagens flash ── */
        .flash-box {
            border-radius: 5px;
            padding: .65rem .9rem;
            font-size: .88rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .flash-error   { background: #fff5f5; border: 1px solid #f5c6cb; color: var(--danger); }
        .flash-success { background: #f0fff4; border: 1px solid #c3e6cb; color: var(--success); }

        /* ── Erro inline ── */
        #loginError {
            display: none;
            margin-top: 1rem;
        }

        /* ── Divisor ── */
        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: 1.5rem 0 1rem;
            color: var(--text-muted);
            font-size: .8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Link versão ── */
        .version {
            text-align: center;
            font-size: .75rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="login-card">

        <!-- Branding -->
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1>Exitus</h1>
            <p>Controle e Análise de Investimentos</p>
        </div>

        <!-- Flash messages do servidor -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-box flash-{{ 'error' if category == 'error' else 'success' }}">
                    <i class="fas fa-{{ 'exclamation-circle' if category == 'error' else 'check-circle' }}"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <!-- Formulário -->
        <form id="loginForm" novalidate>
            <div class="field">
                <label for="username">Usuário</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="Seu usuário"
                           required
                           autocomplete="username"
                           autofocus>
                </div>
            </div>

            <div class="field">
                <label for="password">Senha</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="••••••••"
                           required
                           autocomplete="current-password">
                </div>
            </div>

            <!-- Erro inline de autenticação -->
            <div class="flash-box flash-error" id="loginError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="loginErrorMsg">Usuário ou senha incorretos.</span>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span>Entrar</span>
            </button>
        </form>

        <div class="version">Exitus v0.9.19</div>
    </div>

    <!-- auth.js antes do script de login -->
    <script src="/static/js/auth.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorBox  = document.getElementById('loginError');
            const errorMsg  = document.getElementById('loginErrorMsg');

            // Esconder erro anterior
            errorBox.style.display = 'none';

            // Feedback no botão
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    // Salvar token no localStorage via AuthManager
                    if (window.auth) {
                        window.auth.saveToken(result.token, result.user);
                    }
                    window.location.href = result.redirect || '/dashboard/';
                } else {
                    errorMsg.textContent = result.message || 'Usuário ou senha incorretos.';
                    errorBox.style.display = 'flex';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                }
            } catch (err) {
                errorMsg.textContent = 'Erro de conexão. Verifique sua rede e tente novamente.';
                errorBox.style.display = 'flex';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        });
    </script>

</body>
</html>
